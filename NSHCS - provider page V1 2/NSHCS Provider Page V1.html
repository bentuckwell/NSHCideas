    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;

    // Parse the template and swap the root element. Scripts inserted via

    // createElement so they execute, awaiting onload for src scripts to

    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

      const s = document.createElement('script');

    }

    setStatus('Error unpacking: ' + err.message);

class=\"form-grid__value\">n.ashford@northgate.example.org<\u002Fspan>\n                              <label>Phone<\u002Flabel>\n                              <span class=\"form-grid__value\">+44 117 496 0192<\u002Fspan>\n                              <label>Start / End date<\u002Flabel>\n                              <span class=\"form-grid__value date-pair\">\n                                <span><small>Start<\u002Fsmall>11 Nov 2018<\u002Fspan>\n                                <span><small>End<\u002Fsmall>21 Aug 2022<\u002Fspan>\n                              <\u002Fspan>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                          <div class=\"past-entry\">\n                            <p class=\"past-entry__title\">Previous site<\u002Fp>\n                            <div class=\"form-grid\">\n                              <label>Site name<\u002Flabel>\n                              <span class=\"form-grid__value\">Eastfield County Clinic<\u002Fspan>\n                              <label>Site contact<\u002Flabel>\n                              <span class=\"form-grid__value\">Tomasz Kowalski<\u002Fspan>\n                              <label>Email<\u002Flabel>\n                              <span class=\"form-grid__value\">t.kowalski@eastfield.example.org<\u002Fspan>\n                              <label>Phone<\u002Flabel>\n                              <span class=\"form-grid__value\">+44 117 496 0077<\u002Fspan>\n                              <label>Start / End date<\u002Flabel>\n                              <span class=\"form-grid__value date-pair\">\n                                <span><small>Start<\u002Fsmall>05 Mar 2015<\u002Fspan>\n                                <span><small>End<\u002Fsmall>10 Nov 2018<\u002Fspan>\n                              <\u002Fspan>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsection>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsection>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <footer class=\"site-footer\">\n    <div class=\"site-footer__top-rule\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"site-footer__inner\">\n      <p class=\"site-footer__heading\">ALL LINKS OPEN IN NEW TABS<\u002Fp>\n      <ul class=\"site-footer__links\">\n        <li><a href=\"#\">Trainee Management System support<\u002Fa><\u002Fli>\n        <li><a href=\"#\">OneFile<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Curriculum library<\u002Fa><\u002Fli>\n      <\u002Ful>\n      <ul class=\"site-footer__links site-footer__links--secondary\">\n        <li><a href=\"#\">National School of Healthcare Science<\u002Fa><\u002Fli>\n      <\u002Ful>\n      <hr class=\"site-footer__rule\">\n      <div class=\"site-footer__bottom\">\n        <ul class=\"site-footer__legal\">\n          <li><a href=\"#\">Terms and conditions<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Accessibility<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Privacy<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Cookies<\u002Fa><\u002Fli>\n        <\u002Ful>\n        <p class=\"site-footer__copy\">\n          © Copyright National School of Healthcare Science<br>\n          and <a href=\"#\">NHS England<\u002Fa>\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <script>\n    document.querySelectorAll('.box').forEach((box) => {\n      const btn = box.querySelector(':scope > .box__header');\n      if (!btn) return;\n      // Provider name (root) is locked open\n      if (box.id === 'box') return;\n      btn.addEventListener('click', (e) => {\n        e.stopPropagation();\n        const open = box.getAttribute('data-open') === 'true';\n        const next = !open;\n        box.setAttribute('data-open', String(next));\n        btn.setAttribute('aria-expanded', String(next));\n      });\n    });\n    document.querySelectorAll('.show-past').forEach((btn) => {\n      btn.addEventListener('click', (e) => {\n        e.stopPropagation();\n        const target = document.getElementById(btn.dataset.target);\n        if (!target) return;\n        const open = target.classList.toggle('is-open');\n        btn.setAttribute('aria-expanded', String(open));\n        btn.textContent = open ? 'Hide past contacts' : 'Show past contacts';\n      });\n    });\n\n    // Sidebar provider switching\n    const providerTitleEl = document.querySelector('#box > .box__header > .box__title');\n    document.querySelectorAll('#provider-list a').forEach((a) => {\n      a.addEventListener('click', (e) => {\n        e.preventDefault();\n        document.querySelectorAll('#provider-list a').forEach(x => x.classList.remove('is-active'));\n        a.classList.add('is-active');\n        if (providerTitleEl) providerTitleEl.textContent = a.dataset.provider;\n        // Also update hero title? Keep hero static.\n      });\n    });\n\n    // In every Head of department block: remove \"Site name\" rows and rename \"Site contact\" to \"Name\".\n    (function () {\n      document.querySelectorAll('section.box section.box.box--nested').forEach((inner) => {\n        const title = inner.querySelector(':scope > .box__header > .box__title');\n        if (!title || (title.textContent.trim() !== 'Head of department' && title.textContent.trim() !== 'Training officer')) return;\n        // Add Department row after the Name row if not present\n        inner.querySelectorAll('.form-grid').forEach((grid) => {\n          if (grid.querySelector(':scope > label[data-dept]')) return;\n          const labels = [...grid.querySelectorAll(':scope > label')];\n          if (labels.some(l => l.textContent.trim() === 'Department')) return;\n          // Find the Name (or Site contact, pre-rename) label to insert AFTER its value\n          const nameLbl = labels.find(l => {\n            const t = l.textContent.trim();\n            return t === 'Name' || t === 'Site contact';\n          });\n          const lbl = document.createElement('label');\n          lbl.textContent = 'Department';\n          lbl.dataset.dept = '1';\n          const val = document.createElement('span');\n          val.className = 'form-grid__value';\n          val.textContent = title.textContent.trim() === 'Training officer' ? 'Microbiology training' : 'Microbiology';\n          if (nameLbl && nameLbl.nextElementSibling && nameLbl.nextElementSibling.classList.contains('form-grid__value')) {\n            // insert after the name's value span\n            const after = nameLbl.nextElementSibling.nextSibling;\n            grid.insertBefore(lbl, after);\n            grid.insertBefore(val, after);\n          } else {\n            grid.appendChild(lbl);\n            grid.appendChild(val);\n          }\n        });\n        inner.querySelectorAll('.form-grid > label').forEach((lbl) => {\n          if (title.textContent.trim() !== 'Head of department') return;\n          const text = lbl.textContent.trim();\n          if (text === 'Site name') {\n            const val = lbl.nextElementSibling;\n            lbl.remove();\n            if (val && val.classList.contains('form-grid__value')) val.remove();\n          } else if (text === 'Site contact') {\n            lbl.textContent = 'Name';\n          }\n        });\n        // Remove the \"Start\" / \"End\" mini-labels next to the dates\n        inner.querySelectorAll('.date-pair > span > small').forEach((s) => s.remove());\n      });\n    })();\n\n    // Lift \"Hospital sites\" group out of the Provider accordion so they sit as sibling cards.\n    (function () {\n      const providerBox = document.getElementById('box');\n      if (!providerBox) return;\n      const heading = providerBox.querySelector('.section-heading');\n      if (!heading) return;\n      // Collect heading + all subsequent .box--nested.box--no-chev siblings (the hospital site cards)\n      const group = [heading];\n      let n = heading.nextElementSibling;\n      while (n && n.matches('section.box.box--nested')) {\n        group.push(n);\n        n = n.nextElementSibling;\n      }\n      const wrap = document.createElement('div');\n      wrap.className = 'hospital-sites-group';\n      group.forEach(el => wrap.appendChild(el));\n      providerBox.parentNode.insertBefore(wrap, providerBox.nextSibling);\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
